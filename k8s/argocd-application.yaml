apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: student-fullstack-app
  namespace: argocd
spec:
  project: default

  source:
    repoURL: https://github.com/prasadA7989/student-fullstack-k8s-argocd.git
    targetRevision: main
    path: k8s

  destination:
    server: https://kubernetes.default.svc
    namespace: student-app

  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
