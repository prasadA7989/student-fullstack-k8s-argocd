name: CI - Build and Push Docker Images

on:
  push:
    branches:
      - main

permissions:
  contents: write
  packages: write

jobs:
  build-and-push:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout source code
        uses: actions/checkout@v4

      - name: Login to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push backend image
        uses: docker/build-push-action@v6
        with:
          context: ./backend
          push: true
          tags: ghcr.io/prasada7989/student-backend:${{ github.sha }},ghcr.io/prasada7989/student-backend:latest

      - name: Build and push frontend image
        uses: docker/build-push-action@v6
        with:
          context: ./frontend
          push: true
          build-args: |
            REACT_APP_API_URL=http://backend-service.student-app.svc.cluster.local:5000
          tags: ghcr.io/prasada7989/student-frontend:${{ github.sha }},ghcr.io/prasada7989/student-frontend:latest

      - name: Update backend image tag in Kubernetes manifest
        run: |
          sed -i "s|ghcr.io/prasada7989/student-backend:.*|ghcr.io/prasada7989/student-backend:${{ github.sha }}|g" k8s/backend.yaml

      - name: Update frontend image tag in Kubernetes manifest
        run: |
          sed -i "s|ghcr.io/prasada7989/student-frontend:.*|ghcr.io/prasada7989/student-frontend:${{ github.sha }}|g" k8s/frontend.yaml

      - name: Commit updated Kubernetes manifests
        run: |
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"
          git add k8s/backend.yaml k8s/frontend.yaml
          git commit -m "Update image tags to ${{ github.sha }}" || echo "No changes to commit"
          git push